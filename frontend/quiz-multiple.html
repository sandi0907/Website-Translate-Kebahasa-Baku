<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bahasa - BahasaBaku AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">BahasaBaku<span class="text-slate-800"></span></h1>
            <div class="space-x-6">
                <a href="index.html" class="hover:text-blue-600">Home</a>
                <a href="kamus.html" class="hover:text-blue-600">Kamus</a>
                <a href="quiz.html" class="text-blue-600 font-semibold">Quiz</a>
                <a href="chat-dosen.html" class="hover:text-blue-600">Etika Chat</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4 max-w-4xl">
        <div class="flex space-x-4 mb-8 justify-center">
            <button onclick="switchQuiz('pg')" id="btnPg" class="px-6 py-2 rounded-full bg-blue-600 text-white font-bold">Pilihan Ganda (20 Soal)</button>
            <button onclick="switchQuiz('essay')" id="btnEssay" class="px-6 py-2 rounded-full bg-white text-blue-600 border border-blue-600 font-bold">Essay AI (20 Soal)</button>
        </div>

        <div id="quizPg" class="bg-white p-8 rounded-2xl shadow-lg">
            <div id="questionContainer">
                <span class="text-blue-600 font-bold">Soal #1</span>
                <p class="text-xl mt-2 mb-6">Manakah penulisan kata baku yang benar di bawah ini?</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button class="p-4 border rounded-xl hover:bg-blue-50 text-left transition">A. Aktifitas</button>
                    <button class="p-4 border rounded-xl hover:bg-blue-50 text-left transition">B. Aktivitas</button>
                    </div>
            </div>
            <div class="mt-8 flex justify-between items-center border-t pt-4">
                <span id="scoreDisplay">Skor: 0</span>
                <button class="bg-blue-600 text-white px-6 py-2 rounded-lg">Next Question</button>
            </div>
        </div>

        <div id="quizEssay" class="hidden bg-white p-8 rounded-2xl shadow-lg">
            <p class="text-lg font-bold mb-4">Tuliskan kembali kalimat ini dalam bentuk baku: "Aku sudah bilang sama dia buat nggak telat lagi."</p>
            <textarea class="w-full p-4 border rounded-xl" rows="4" placeholder="Ketik jawaban Anda..."></textarea>
            <button onclick="evaluateEssay()" class="mt-4 bg-green-600 text-white px-8 py-3 rounded-lg font-bold">Submit Jawaban (AI Evaluation)</button>
            
            <div id="essayResult" class="hidden mt-6 p-4 bg-yellow-50 rounded-lg border-l-4 border-yellow-400">
                <h4 class="font-bold">Hasil Evaluasi AI:</h4>
                <p id="aiFeedback" class="italic text-slate-700"></p>
            </div>
        </div>
    </main>

    <script>
        function switchQuiz(type) {
            const pg = document.getElementById('quizPg');
            const essay = document.getElementById('quizEssay');
            const btnPg = document.getElementById('btnPg');
            const btnEssay = document.getElementById('btnEssay');

            if(type === 'pg') {
                pg.classList.remove('hidden');
                essay.classList.add('hidden');
                btnPg.className = "px-6 py-2 rounded-full bg-blue-600 text-white font-bold";
                btnEssay.className = "px-6 py-2 rounded-full bg-white text-blue-600 border border-blue-600 font-bold";
            } else {
                pg.classList.add('hidden');
                essay.classList.remove('hidden');
                btnEssay.className = "px-6 py-2 rounded-full bg-blue-600 text-white font-bold";
                btnPg.className = "px-6 py-2 rounded-full bg-white text-blue-600 border border-blue-600 font-bold";
            }
        }
    </script>
</body>
</html>
